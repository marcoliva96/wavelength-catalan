<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="50%" stop-color="#ffe66d"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Dial arc -->
  <path d="M 80 320 A 176 176 0 0 1 432 320" fill="none" stroke="url(#wave)" stroke-width="36" stroke-linecap="round"/>
  <!-- Target needle -->
  <line x1="256" y1="320" x2="256" y2="140" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <circle cx="256" cy="320" r="20" fill="#ffffff"/>
  <!-- Bull's eye marker -->
  <circle cx="256" cy="140" r="22" fill="#ffe66d" stroke="#ff6b6b" stroke-width="6"/>
</svg>
